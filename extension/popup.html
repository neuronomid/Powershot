<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Powershot</title>
    <script type="module" src="/src/popup.ts"></script>
  </head>
  <body>
    <main class="popup-shell">
      <section class="popup-card">
        <header class="header">
          <p class="eyebrow">Capture tray</p>
          <h1>Powershot</h1>
          <p class="subhead">
            Stack screenshots, then extract once for notes, flashcards, or both.
          </p>
        </header>

        <div class="actions">
          <button id="capture-visible" class="primary" type="button">
            <span class="btn-label">Capture visible tab</span>
            <kbd class="kbd">⌥⇧S</kbd>
          </button>
          <button id="capture-region" class="secondary" type="button">
            <span class="btn-label">Capture region</span>
            <kbd class="kbd">⌥⇧R</kbd>
          </button>
        </div>

        <div class="tray-header">
          <span id="tray-count" class="tray-count">0 captures</span>
          <button
            id="tray-clear"
            class="text-button"
            type="button"
            hidden
          >
            Clear all
          </button>
        </div>

        <div id="tray" class="tray" aria-live="polite">
          <p id="tray-empty" class="tray-empty">
            No captures yet. Use the buttons above or the keyboard shortcuts.
          </p>
        </div>

        <button id="send-batch" class="send" type="button" disabled>
          <span id="send-label">Send to extraction</span>
        </button>

        <a
          id="open-app"
          class="link"
          href="https://powershot.org/new"
          target="_blank"
          rel="noreferrer"
        >
          Open extraction
        </a>

        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
