  <rect x="90" y="90" width="1260" height="900" rx="36" fill="#fffdfa" stroke="#d3c3ab" stroke-width="4" />
  <text x="150" y="195" fill="#8c4b1f" font-family="Georgia, serif" font-size="38" font-weight="700">Week 7: Distributed Systems</text>
  <text x="150" y="255" fill="#2b2b2b" font-family="Arial, sans-serif" font-size="74" font-weight="700">Consensus in practice</text>
  <text x="150" y="330" fill="#5d5146" font-family="Arial, sans-serif" font-size="28">How nodes agree on a log while failures and network delays keep happening</text>
  <g fill="#2f4f6b" font-family="Arial, sans-serif" font-size="34">
    <text x="180" y="455">1. Safety: committed entries never diverge.</text>
    <text x="180" y="525">2. Liveness depends on timeouts and majority reachability.</text>
    <text x="180" y="595">3. Leaders serialize writes; followers validate term history.</text>
    <text x="180" y="665">4. Snapshots trim history but preserve the latest state.</text>
  </g>
